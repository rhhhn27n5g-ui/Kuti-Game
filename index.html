<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuti Game</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

*{
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    -webkit-user-select:none;
}

#game{
    position:relative;
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
}

#scene{
    width:100%;
    height:100%;
    object-fit:contain;
    pointer-events:none;
}

#characterClick,
#gunClick,
#cabinetClick,
#stereoClick,
#lampClick{
    position:absolute;
    background:transparent;
    cursor:pointer;
}

#characterClick{
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:18%;
    height:30%;
}

#gunClick{
    right:8%;
    top:66%;
    width:8%;
    height:10%;
}

#cabinetClick{
    right:14%;
    top:78%;
    width:8%;
    height:10%;
}

#stereoClick{
    right:26%;
    top:44%;
    width:9%;
    height:12%;
}

#lampClick{
    left:13%;
    top:16%;
    width:9%;
    height:16%;
}
</style>
</head>

<body>

<div id="game">

<img id="scene" src="./idle.png">

<div id="characterClick"></div>
<div id="gunClick"></div>
<div id="cabinetClick"></div>
<div id="stereoClick"></div>
<div id="lampClick"></div>

</div>

<script>

let clickStage=0;
let stereoStage=0;
let animationPlaying=false;
let currentFrameLoop=null;

function makeFrames(folder,start,end){

let frames=[];

for(let i=start;i<=end;i++){

let num=String(i).padStart(3,"0");

frames.push(`./${folder}/frame_${num}.png`);

}

return frames;
}

const animations=[
makeFrames("phone_call",1,12),
makeFrames("punch",13,17),
makeFrames("phone_text",18,29)
];

const gunAnimation=makeFrames("gun reload",30,33);
const cabinetAnimation=makeFrames("cabinet",34,43);
const stereoAnimation=makeFrames("stereo",44,56);
const lampAnimation=makeFrames("lamp",57,68);

/* preload images */

const imageCache={};

[
...animations.flat(),
...gunAnimation,
...cabinetAnimation,
...stereoAnimation,
...lampAnimation,
"./idle.png"

].forEach(src=>{

const img=new Image();
img.src=src;
imageCache[src]=img;

});

/* preload sounds */

const sounds={};

[
"call.mp3",
"punch.mp3",
"text.mp3",
"gun.mp3",
"cabinet.mp3",
"lamp.mp3",
"stereo_1.mp3",
"stereo_2.mp3",
"stereo_3.mp3"

].forEach(file=>{

const audio=new Audio(`./sounds/${file}`);

audio.preload="auto";

sounds[file]=audio;

});

/* sound */

function playSound(file){

let sound=sounds[file].cloneNode();

sound.play().catch(()=>{});

}

/* animation */

function playAnimation(frames){

if(animationPlaying)return;

animationPlaying=true;

cancelAnimationFrame(currentFrameLoop);

let scene=document.getElementById("scene");

let frame=0;
let previous=0;

function animate(timestamp){

if(timestamp-previous>100){

scene.src=imageCache[frames[frame]].src;

frame++;

previous=timestamp;

}

if(frame<frames.length){

currentFrameLoop=requestAnimationFrame(animate);

}else{

scene.src="./idle.png";
animationPlaying=false;

}

}

requestAnimationFrame(animate);

}

/* clicks */

characterClick.onclick=()=>{

if(animationPlaying)return;

playAnimation(animations[clickStage]);

if(clickStage===0)playSound("call.mp3");
if(clickStage===1)playSound("punch.mp3");
if(clickStage===2)playSound("text.mp3");

clickStage=(clickStage+1)%3;

};

gunClick.onclick=()=>{

if(animationPlaying)return;

playAnimation(gunAnimation);

playSound("gun.mp3");

};

cabinetClick.onclick=()=>{

if(animationPlaying)return;

playAnimation(cabinetAnimation);

playSound("cabinet.mp3");

};

lampClick.onclick=()=>{

if(animationPlaying)return;

playAnimation(lampAnimation);

playSound("lamp.mp3");

};

stereoClick.onclick=()=>{

if(animationPlaying)return;

playAnimation(stereoAnimation);

if(stereoStage===0)playSound("stereo_1.mp3");
if(stereoStage===1)playSound("stereo_2.mp3");
if(stereoStage===2)playSound("stereo_3.mp3");

stereoStage=(stereoStage+1)%3;

};

</script>

</body>
</html>
